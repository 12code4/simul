name: Deploy to GitHub Pages

# Two-channel deploy: the stable game (main) serves at the site root, and the
# experimental build (beta) serves under /beta/ for playtesting. A push to
# either branch rebuilds and republishes both, so they never wipe each other.
on:
  push:
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stable (main)
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable

      - name: Checkout beta
        uses: actions/checkout@v4
        with:
          ref: beta
          path: beta

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build stable
        run: cd stable && npm ci && npm run build

      - name: Build beta
        run: cd beta && npm ci && npm run build

      - name: Assemble site (stable at /, beta at /beta/)
        run: |
          mkdir -p site/beta
          cp -r stable/dist/* site/
          cp -r beta/dist/* site/beta/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
